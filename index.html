  <style id="theme-variables">
    :root {
      --color-primary: #D4AF37;
      /* Royal Gold - Prestigious & Metallic */
      --color-primary-dark: #B8934B;
      --color-secondary: #121212;
      /* Onyx Black - Deep Luxury */
      --color-accent: #C5A021;
      /* Imperial Gold - High Interaction */
      --color-background: #FBF9F4;
      /* Champagne Pearl - Soft & Sophisticated */
      --color-neutral-dark: #1A1A1A;
      /* Charcoal Deep */
      --color-border: #E8E2D9;
      /* Antique Silver/Gold Border */
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(212, 175, 55, 0.2);
      --glass-shadow: 0 25px 80px rgba(184, 147, 75, 0.12);
    }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary': 'var(--color-primary)',
            'primary-dark': 'var(--color-primary-dark)',
            'secondary': 'var(--color-secondary)',
            'accent': 'var(--color-accent)',
            'background': 'var(--color-background)',
            'neutral-dark': 'var(--color-neutral-dark)',
            'luxury-border': 'var(--color-border)',
          },
          fontFamily: {
            sans: ['"Instrument Sans"', 'Inter', 'sans-serif'],
            serif: ['"Playfair Display"', 'Cormorant Garamond', 'serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          backdropBlur: {
            xs: '2px',
          },
          boxShadow: {
            'premium': '0 20px 50px rgba(215, 181, 109, 0.08)',
            'glass': 'var(--glass-shadow)',
          },
          borderRadius: {
            'luxury': '2rem',
          }
        }
      }
    }
  </script>
  <!-- Preconnect to external domains for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

  <style>
    @layer utilities {
      .glass-card {
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 8px 30px 0 rgba(215, 181, 109, 0.08);
      }

      .glass-card-dark {
        background: rgba(45, 45, 45, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25);
      }

      .glass-header {
        background: rgba(252, 251, 247, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(215, 181, 109, 0.1);
      }

      .bento-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        grid-auto-rows: minmax(180px, auto);
        gap: 2rem;
      }

      .text-gradient {
        background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .luxury-border-thin {
        border: 1px solid var(--color-border);
      }
    }

    body {
      font-family: 'Instrument Sans', 'Inter', sans-serif;
      background-color: var(--color-background);
      color: var(--color-neutral-dark);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .font-serif {
      font-family: 'Playfair Display', serif !important;
    }

    .font-outfit {
      font-family: 'Outfit', sans-serif;
    }

    @keyframes ken-burns {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(1.1);
      }
    }

    @keyframes fade-in-up {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-ken-burns {
      animation: ken-burns 20s ease-out infinite alternate;
    }

    .animate-fade-in-up {
      animation: fade-in-up 0.8s ease-out forwards;
      opacity: 0;
    }

    .delay-100 {
      animation-delay: 0.1s;
    }

    .delay-200 {
      animation-delay: 0.2s;
    }

    .delay-300 {
      animation-delay: 0.3s;
    }

    .delay-400 {
      animation-delay: 0.4s;
    }

    /* Custom styles for QuillJS to match the theme */
    .ql-editor {
      min-height: 300px;
      font-size: 1rem;
      line-height: 1.6;
    }

    .ql-container {
      border-bottom-left-radius: 0.375rem;
      border-bottom-right-radius: 0.375rem;
      border-color: #d1d5db;
    }

    .ql-toolbar {
      border-top-left-radius: 0.375rem;
      border-top-right-radius: 0.375rem;
      border-color: #d1d5db;
      background-color: #f9fafb;
    }
  </style>

  <style>
    /* Critical CSS to prevent flicker before Tailwind loads */
    body {
      background-color: #FBF9F4 !important;
      color: #1A1A1A !important;
    }

    #root {
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    #root:not(:empty) {
      opacity: 1;
    }
  </style>
